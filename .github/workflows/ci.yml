name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux native CLI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            g++ \
            fonts-dejavu-core \
            libcurl4-openssl-dev \
            zlib1g-dev

      - name: Verify Linux build and exporter
        run: sh scripts/verify-linux.sh

      - name: Perf watcher quick smoke
        run: |
          python3 -B scripts/perf_watch.py \
            --binary build/linux-verify/rayomd \
            --platform linux-ci \
            --suite quick \
            --label ci \
            --root benchmark-output/perf-watch-ci

  windows:
    name: Windows ImGui app
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2 MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-make

      - name: Configure
        run: cmake -S . -B build/windows -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build/windows --config Release

      - name: Benchmark smoke
        run: |
          ./build/windows/rayomd.exe \
            --bench tester.md benchmark-output/windows-ci 50 modern normal
          test -s benchmark-output/windows-ci/sample.pdf

