name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux native CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ fonts-dejavu-core libcurl4-openssl-dev zlib1g-dev
      - name: Configure
        run: cmake -S . -B build/linux -DCMAKE_BUILD_TYPE=Release -DRAYOMD_USE_CURL=OFF
      - name: Build
        run: cmake --build build/linux --config Release
      - name: Verify CLI
        run: python3 -B tests/verify_cli.py --binary build/linux/rayomd
      - name: Check default dependencies
        run: |
          if ldd build/linux/rayomd | grep -q libcurl; then
            echo "Default Linux build must not link libcurl." >&2
            exit 1
          fi
      - name: Build optional curl edition
        run: |
          cmake -S . -B build/linux-curl -DCMAKE_BUILD_TYPE=Release -DRAYOMD_USE_CURL=ON
          cmake --build build/linux-curl --config Release

  windows:
    name: Windows ImGui app
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-make
            mingw-w64-ucrt-x86_64-python
      - name: Configure
        run: cmake -S . -B build/windows -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build/windows --config Release
      - name: Verify CLI
        run: python -B tests/verify_cli.py --binary build/windows/rayomd.exe