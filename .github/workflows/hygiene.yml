name: Repository Hygiene

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: hygiene-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hygiene:
    name: Docs, scripts, and release layout
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Required release files and assets
        run: |
          test -f README.md
          test -f LICENSE
          test -f NOTICE
          test -f AGENTS.md
          test -f CONTRIBUTING.md
          test -f VERSION
          test -f docs/assets/branding/rayomd.png
          test -f docs/assets/branding/rayomd.ico
          test -f docs/assets/demo/ui.png
          test -f docs/assets/demo/show.gif
          test -f docs/assets/demo/show.mp4
          test -f docs/benchmarks/releases/README.md
          test -f docs/development/performance.md
          test -f tests/verify_cli.py
          test -f tools/benchmark.py
          test -f third_party/imgui/LICENSE.txt
          test -f third_party/simdutf/LICENSE-APACHE
          test -f third_party/simdutf/LICENSE-MIT
      - name: Python helper syntax and entry points
        run: |
          python3 -m py_compile tests/verify_cli.py tools/benchmark.py scripts/perf_watch.py scripts/compare_pandoc.py scripts/compare_markdown_pdf_tools.py scripts/archive_release_benchmarks.py scripts/concurrency_benchmark.py scripts/train_pgo.py
          python3 -B tests/verify_cli.py --help >/dev/null
          python3 -B tools/benchmark.py --help >/dev/null
          python3 -B tools/benchmark.py run -- --help >/dev/null
          python3 -B tools/benchmark.py compare -- --help >/dev/null
          python3 -B tools/benchmark.py release -- --help >/dev/null
          python3 -B tools/benchmark.py competitors -- --help >/dev/null
          python3 -B scripts/concurrency_benchmark.py --help >/dev/null
          python3 -B scripts/train_pgo.py --help >/dev/null
      - name: Keep generated outputs out of source
        run: |
          if git ls-files | grep -E '(^build/|^benchmark-output/|\.exe$|\.dll$|\.so$|\.dylib$|\.pdf$|^rayomd$)'; then
            echo "Generated output or local binary is tracked." >&2
            exit 1
          fi
      - name: README local link targets
        run: |
          test -f docs/assets/branding/rayomd.png
          test -f docs/assets/demo/ui.png
          test -f docs/assets/demo/show.gif
          test -f docs/assets/demo/show.mp4
          test -f docs/benchmark_smoke.md
          test -f docs/benchmarks/commercial_benchmark_summary.md
          test -f docs/benchmarks/releases/README.md
          test -f include/rayomd/tiny_pdf.h